name: Quality Checks

on:
  pull_request:
    branches: [main]

jobs:
  check:
    name: Rust Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Rust toolchain
        uses: actions-rs/toolchain@16499b5e05bf2e26879000db0c1d13f7e13fa3af # v1.0.7
        with:
          toolchain: stable
      - name: Check Rust code
        run: cd markdown-renderer && cargo check --features sanitize
      - name: Run Clippy
        run: cd markdown-renderer && cargo clippy -- -D warnings
      - name: Run Tests
        run: cd markdown-renderer && cargo test --features sanitize
  biome:
    name: Run BiomeJS
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Rust toolchain
        uses: actions-rs/toolchain@16499b5e05bf2e26879000db0c1d13f7e13fa3af # v1.0.7
        with:
          toolchain: stable
      - name: Cache wasm-pack
        id: cache-wasm-pack
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cargo/bin/wasm-pack
          key: wasm-pack-${{ runner.os }}
      - name: Install wasm-pack
        if: steps.cache-wasm-pack.outputs.cache-hit != 'true'
        run: cargo install wasm-pack
      - name: Build Rust project
        run: cd markdown-renderer && wasm-pack build --target web --release --features sanitize
      - name: Set up Bun.js
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: latest
      - name: Post-process wasm package
        run: bun process_wasm_pkg.js
      - name: Install Dependencies
        run: bun install
      - name: Build React example
        run: bun run example-react:build
      - name: Run Biome Check
        run: bun run check
