name: Deploy Example to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Bun.js
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: latest

      - name: Cache wasm-pack
        id: cache-wasm-pack
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cargo/bin/wasm-pack
          key: wasm-pack-${{ runner.os }}

      - name: Install wasm-pack
        if: steps.cache-wasm-pack.outputs.cache-hit != 'true'
        run: cargo install wasm-pack

      - name: Build Rust project
        run: cd markdown-renderer && wasm-pack build --target web --features sanitize

      - name: Post-process wasm package
        run: bun process_wasm_pkg.js

      - name: Install dependencies (workspace)
        run: bun install

      - name: Build library
        run: bun run build

      - name: Install example dependencies
        run: cd example && bun install

      - name: Build example
        run: cd example && bun run build

      - name: Deploy to GitHub Pages
        uses: jamesives/github-pages-deploy-action@36ee275936a1c16fb4dedae090a06396849f07c0 # v4.7.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
          folder: example/dist
